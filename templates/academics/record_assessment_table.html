<!-- templates/academics/record_assessment_table.html -->

{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h2 class="h4 mb-0">Record CBC Assessment</h2>
        </div>
        <a href="{% url 'academics:teacher_dashboard' %}" class="td-btn td-btn-outline" aria-label="Go back"
        style=" width:30%;top:15px; left:15px; z-index:1000; margin:20px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;margin-right:8px;">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
        </a>
        
        <div class="card-body">
            <!-- Step 1: Selection Area -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label for="grade" class="form-label">Grade <span class="text-danger">*</span></label>
                    <select id="grade" class="form-select" required>
                        <option value="">-- Select Grade --</option>
                        {% for grade in grades %}
                        <option value="{{ grade }}">{{ grade }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label for="stream" class="form-label">Stream</label>
                    <select id="stream" class="form-select">
                        <option value="">-- All Streams --</option>
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                    <select id="subject" class="form-select" required>
                        <option value="">-- Select Subject --</option>
                        {% for subject in subjects %}
                        <option value="{{ subject.id }}">{{ subject.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label for="competency" class="form-label">Competency <span class="text-danger">*</span></label>
                    <select id="competency" class="form-select" required>
                        <option value="">-- Select Competency --</option>
                        {% for competency in competencies %}
                        <option value="{{ competency.id }}">{{ competency.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-3">
                    <label for="term" class="form-label">Term <span class="text-danger">*</span></label>
                    <select id="term" class="form-select" required>
                        <option value="">-- Select Term --</option>
                        {% for term in terms %}
                        <option value="{{ term.id }}">{{ term.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            
            <!-- Student Table will appear here after selections are made -->
            <div id="studentTableContainer">
                <div class="alert alert-info mt-3">Please select Grade, Subject, Competency, and Term to continue.</div>
            </div>
        </div>
    </div>
</div>

<script>
// Global band calculation function (accessible everywhere)
function calculateBand(percentage) {
    if (isNaN(percentage) || percentage === '') {
        return { band: null, label: '--', color: 'secondary' };
    }
    
    const score = parseFloat(percentage);
    
    if (score >= 90) {
        return { band: 'EE1', label: 'EE1 - Exceeding Expectations (90-100%)', color: 'success', points: 8 };
    } else if (score >= 75) {
        return { band: 'EE2', label: 'EE2 - Exceeding Expectations (75-89%)', color: 'success', points: 7 };
    } else if (score >= 58) {
        return { band: 'ME1', label: 'ME1 - Meeting Expectations (58-74%)', color: 'info', points: 6 };
    } else if (score >= 41) {
        return { band: 'ME2', label: 'ME2 - Meeting Expectations (41-57%)', color: 'info', points: 5 };
    } else if (score >= 31) {
        return { band: 'AE1', label: 'AE1 - Approaching Expectations (31-40%)', color: 'warning', points: 4 };
    } else if (score >= 21) {
        return { band: 'AE2', label: 'AE2 - Approaching Expectations (21-30%)', color: 'warning', points: 3 };
    } else if (score >= 11) {
        return { band: 'BE1', label: 'BE1 - Below Expectations (11-20%)', color: 'danger', points: 2 };
    } else {
        return { band: 'BE2', label: 'BE2 - Below Expectations (1-10%)', color: 'danger', points: 1 };
    }
}

// Main JavaScript
document.addEventListener('DOMContentLoaded', function() {
    // DOM elements
    const gradeSelect = document.getElementById('grade');
    const streamSelect = document.getElementById('stream');
    const subjectSelect = document.getElementById('subject');
    const competencySelect = document.getElementById('competency');
    const termSelect = document.getElementById('term');
    const studentContainer = document.getElementById('studentTableContainer');
    
    let currentDraftId = null;
    
    // Load streams when grade changes
    gradeSelect.addEventListener('change', function() {
        const grade = this.value;
        if (grade) {
            fetch(`/academics/api/get-streams/?grade=${encodeURIComponent(grade)}`)
                .then(response => response.json())
                .then(data => {
                    streamSelect.innerHTML = '<option value="">-- All Streams --</option>';
                    data.streams.forEach(stream => {
                        const option = document.createElement('option');
                        option.value = stream.value;
                        option.textContent = stream.label;
                        streamSelect.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error loading streams:', error);
                });
        }
    });
    
    // Load students when all required fields are selected
    function loadStudents(page = 1) {
        const grade = gradeSelect.value;
        const stream = streamSelect.value;
        const subject = subjectSelect.value;
        const competency = competencySelect.value;
        const term = termSelect.value;
        
        if (!grade || !subject || !competency || !term) {
            studentContainer.innerHTML = '<div class="alert alert-info mt-3">Please select Grade, Subject, Competency, and Term to continue.</div>';
            return;
        }
        
        studentContainer.innerHTML = '<div class="text-center mt-5"><div class="spinner-border text-primary"></div><p>Loading students...</p></div>';
        
        fetch(`/academics/api/get-students/?grade=${encodeURIComponent(grade)}&stream=${encodeURIComponent(stream)}&subject=${subject}&competency=${competency}&term=${term}&page=${page}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    studentContainer.innerHTML = `<div class="alert alert-danger mt-3">${data.error}</div>`;
                    return;
                }
                
                currentDraftId = data.draft_id;
                renderStudentTable(data);
            })
            .catch(error => {
                console.error('Error loading students:', error);
                studentContainer.innerHTML = `<div class="alert alert-danger mt-3">Error loading students: ${error.message}</div>`;
            });
    }
    
    // Render student table with pagination
    function renderStudentTable(data) {
        if (!data.students || data.students.length === 0) {
            studentContainer.innerHTML = '<div class="alert alert-warning mt-3">No students found for the selected grade and stream.</div>';
            return;
        }
        
        let html = `
            <div class="table-responsive mt-4">
                <form id="assessmentForm">
                    <table class="table table-bordered table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th width="5%">#</th>
                                <th width="20%">Student Name</th>
                                <th width="8%">Adm No.</th>
                                <th width="8%">Absent</th>
                                <th width="15%">Percentage (%)</th>
                                <th width="15%">Performance Band</th>
                                <th width="29%">Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
        `;
        
        data.students.forEach((student, index) => {
            const rowNum = ((data.current_page - 1) * 20) + index + 1;
            const escapedRemarks = (student.remarks || '').replace(/"/g, '&quot;');
            html += `
                <tr>
                    <td>${rowNum}</td>
                    <td>${escapeHtml(student.name)}</td>
                    <td>${escapeHtml(student.admission_number)}</td>
                    <td class="text-center">
                        <input type="checkbox" class="absent-checkbox" data-student-id="${student.id}" ${student.absent ? 'checked' : ''} style="width: 20px; height: 20px;">
                    </td>
                    <td>
                        <input type="number" 
                               step="0.01" 
                               class="form-control percentage-input" 
                               data-student-id="${student.id}"
                               value="${student.percentage || ''}"
                               placeholder="0-100">
                    </td>
                    <td class="band-cell" id="band_${student.id}">
                        <span class="badge bg-secondary">--</span>
                    </td>
                    <td>
                        <input type="text" 
                               class="form-control remark-input" 
                               data-student-id="${student.id}"
                               value="${escapedRemarks}"
                               placeholder="Optional remarks...">
                    </td>
                </tr>
            `;
        });
        
        html += `
                        </tbody>
                    </table>
        `;
        
        // Add pagination
        if (data.total_pages > 1) {
            html += `<nav aria-label="Page navigation" class="mt-3">
                        <ul class="pagination justify-content-center">`;
            
            if (data.has_previous) {
                html += `<li class="page-item">
                            <a class="page-link" href="#" data-page="${data.previous_page_number}">Previous</a>
                         </li>`;
            }
            
            for (let i = 1; i <= data.total_pages; i++) {
                html += `<li class="page-item ${data.current_page === i ? 'active' : ''}">
                            <a class="page-link" href="#" data-page="${i}">${i}</a>
                         </li>`;
            }
            
            if (data.has_next) {
                html += `<li class="page-item">
                            <a class="page-link" href="#" data-page="${data.next_page_number}">Next</a>
                         </li>`;
            }
            
            html += `</ul></nav>`;
        }
        
        html += `<div class="mt-4 d-flex justify-content-between">
                    <button type="button" id="saveDraftBtn" class="btn btn-secondary">
                        <i class="fas fa-save"></i> Save Draft
                    </button>
                    <button type="button" id="submitFinalBtn" class="btn btn-dark">
                        <i class="fas fa-check-circle"></i> Submit Final
                    </button>
                </div>
            </form>
        </div>`;
        
        studentContainer.innerHTML = html;
        
        // Re-attach event listeners
        attachEventListeners();
        
        // Trigger band calculation for any pre-filled percentages
        document.querySelectorAll('.percentage-input').forEach(input => {
            input.dispatchEvent(new Event('input'));
        });
    }
    
    // Helper function to escape HTML
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Event listeners for dynamic elements
    function attachEventListeners() {
        // Percentage inputs for live band calculation
        document.querySelectorAll('.percentage-input').forEach(input => {
            input.addEventListener('input', function() {
                const studentId = this.dataset.studentId;
                const percentage = this.value;
                const result = calculateBand(percentage);
                const bandCell = document.getElementById(`band_${studentId}`);
                
                if (result.band) {
                    bandCell.innerHTML = `<span class="badge bg-${result.color}">${result.label}</span>`;
                } else {
                    bandCell.innerHTML = `<span class="badge bg-secondary">--</span>`;
                }
            });
        });
        
        // Absent checkboxes - disable percentage when checked
        document.querySelectorAll('.absent-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const studentId = this.dataset.studentId;
                const percentageInput = document.querySelector(`.percentage-input[data-student-id="${studentId}"]`);
                const remarkInput = document.querySelector(`.remark-input[data-student-id="${studentId}"]`);
                
                if (this.checked) {
                    percentageInput.disabled = true;
                    percentageInput.value = '';
                    remarkInput.disabled = true;
                    document.getElementById(`band_${studentId}`).innerHTML = '<span class="badge bg-secondary">Absent</span>';
                } else {
                    percentageInput.disabled = false;
                    remarkInput.disabled = false;
                    percentageInput.dispatchEvent(new Event('input'));
                }
            });
        });
        
        // Save Draft button
        const saveBtn = document.getElementById('saveDraftBtn');
        if (saveBtn) {
            saveBtn.addEventListener('click', saveDraft);
        }
        
        // Submit Final button
        const submitBtn = document.getElementById('submitFinalBtn');
        if (submitBtn) {
            submitBtn.addEventListener('click', submitFinal);
        }
        
        // Pagination links
        document.querySelectorAll('.page-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const page = this.dataset.page;
                if (page) {
                    loadStudents(parseInt(page));
                }
            });
        });
    }
    
    // Save Draft function
    function saveDraft() {
        const draftData = collectFormData();
        
        fetch('/academics/api/save-draft/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                grade: gradeSelect.value,
                stream: streamSelect.value,
                subject_id: subjectSelect.value,
                competency_id: competencySelect.value,
                term_id: termSelect.value,
                draft_data: draftData
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showNotification('Draft saved successfully!', 'success');
            } else {
                showNotification('Error saving draft: ' + data.error, 'danger');
            }
        })
        .catch(error => {
            showNotification('Error: ' + error.message, 'danger');
        });
    }
    
    // Submit Final function
    function submitFinal() {
        const assessments = collectFormData();
        
        // Count missing percentages
        let missingCount = 0;
        let absentCount = 0;
        
        Object.values(assessments).forEach(assessment => {
            if (assessment.absent) {
                absentCount++;
            } else if (!assessment.percentage) {
                missingCount++;
            }
        });
        
        if (missingCount > 0) {
            if (!confirm(`${missingCount} student(s) have no percentage score. ${absentCount} student(s) marked absent. Continue anyway?`)) {
                return;
            }
        }
        
        fetch('/academics/api/submit-assessments/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({
                grade: gradeSelect.value,
                stream: streamSelect.value,
                subject_id: subjectSelect.value,
                competency_id: competencySelect.value,
                term_id: termSelect.value,
                assessments: assessments
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showNotification(data.message, 'success');
                setTimeout(() => {
                    window.location.href = '/academics/record-assessment/';
                }, 2000);
            } else {
                showNotification('Error: ' + data.error, 'danger');
            }
        })
        .catch(error => {
            showNotification('Error: ' + error.message, 'danger');
        });
    }
    
    // Collect all form data
    function collectFormData() {
        const data = {};
        
        document.querySelectorAll('.percentage-input').forEach(input => {
            const studentId = input.dataset.studentId;
            const checkbox = document.querySelector(`.absent-checkbox[data-student-id="${studentId}"]`);
            const remarkInput = document.querySelector(`.remark-input[data-student-id="${studentId}"]`);
            
            data[studentId] = {
                percentage: input.value,
                remarks: remarkInput ? remarkInput.value : '',
                absent: checkbox ? checkbox.checked : false
            };
        });
        
        return data;
    }
    
    // Helper: Get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // Helper: Show notification
    function showNotification(message, type) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3`;
        alertDiv.style.zIndex = '9999';
        alertDiv.style.minWidth = '300px';
        alertDiv.innerHTML = `
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.appendChild(alertDiv);
        
        setTimeout(() => {
            alertDiv.remove();
        }, 3000);
    }
    
    // Load students when selection changes
    [gradeSelect, streamSelect, subjectSelect, competencySelect, termSelect].forEach(select => {
        if (select) {
            select.addEventListener('change', () => loadStudents());
        }
    });
});
</script>
{% endblock %}
