{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">School News</h1>

<div class="row">

{% for post in posts %}

<div class="col-md-4 mb-4">

    <div class="card h-100">

        <img src="{{ post.image.url }}" class="card-img-top">

        <div class="card-body">

            <h5>{{ post.title }}</h5>

            <p>
                {{ post.content|truncatewords:20 }}
            </p>

            <a href="{% url 'news_detail' post.slug %}" class="btn btn-dark">
                Read More
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endblock %}
