{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<h1 class="mb-4">
    Register
</h1>

<form method="POST">

    {% csrf_token %}

    {% for field in form %}

        <div class="mb-3">

            <label class="form-label">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
                <div class="text-danger">
                    {{ field.errors }}
                </div>
            {% endif %}

        </div>

    {% endfor %}

    <button class="btn btn-dark">
        Register
    </button>

</form>

</div>

</div>

{% endblock %}
