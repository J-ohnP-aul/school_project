
<!-- templates/accounts/partials/sidebar.html -->

<div class="sidebar">

  <!-- Brand -->
  <a href="{% url 'admin_dashboard' %}" class="sidebar-brand" style="text-decoration:none;">
    <div class="sidebar-brand-icon">GA</div>
    <div>
      <h2>EduAdmin</h2>
      <span>Greenacre Academy</span>
    </div>
  </a>

  <!-- Nav -->
  <p class="sidebar-section-label">Main Menu</p>

  <ul class="sidebar-links">
    <li>
      <a href="{% url 'admin_dashboard' %}" class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'users_list' %}" class="{% if request.resolver_match.url_name == 'users_list' %}active{% endif %}">
        <span class="nav-icon">👥</span>
        User Management
      </a>
    </li>
    <li>
      <a href="{% url 'applicant_list' %}" class="{% if request.resolver_match.url_name == 'applicant_list' %}active{% endif %}">
        <span class="nav-icon">📋</span>
        Applicants
        {% comment %} Optional badge: <span class="nav-badge">3</span> {% endcomment %}
      </a>
    </li>
    <li>
      <a href="{% url 'create_user' %}" class="{% if request.resolver_match.url_name == 'create_user' %}active{% endif %}">
        <span class="nav-icon">➕</span>
        Create User
      </a>
    </li>
  </ul>

  <p class="sidebar-section-label">Content</p>

  <ul class="sidebar-links">
    <li>
      <a href="/news/">
        <span class="nav-icon">📰</span>
        News
      </a>
    </li>
    <li>
      <a href="/gallery/">
        <span class="nav-icon">🖼️</span>
        Gallery
      </a>
    </li>
    <li>
      <a href="#">
        <span class="nav-icon">⚙️</span>
        Settings
      </a>
    </li>
  </ul>

  <!-- Footer -->
  <div class="sidebar-footer" style="margin-top:auto;">
    <div class="sidebar-footer-avatar">AD</div>
    <div class="sidebar-footer-info">
      <div class="sidebar-footer-name">{{ request.user.username|title }}</div>
      <div class="sidebar-footer-role">Administrator</div>
    </div>
    <a href="/logout/" class="sidebar-footer-logout" title="Log out">↪</a>
  </div>

</div>
