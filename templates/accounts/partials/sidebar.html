
<!-- templates/accounts/partials/sidebar.html -->

<div class="sidebar">

  <!-- Brand -->
  <a href="{% url 'admin_dashboard' %}" class="sidebar-brand" style="text-decoration:none;">
    <div class="sidebar-brand-icon">GA</div>
    <div>
      <h2>Greenfield CMS</h2>
      <span>Admin Dashboard</span>
    </div>
  </a>

  <!-- Nav -->
  <p class="sidebar-section-label">Main Menu</p>

  <ul class="sidebar-links">
     <li>
      <a href="/" class="{% if request.path == '/' %}active{% endif %}">
        <span class="nav-icon">⏪</span>
        Exit to Site
      </a>
    </li>
    <li>
      <a href="{% url 'admin_dashboard' %}" class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'applicant_list' %}" class="{% if request.resolver_match.url_name == 'applicant_list' %}active{% endif %}">
        <span class="nav-icon">📋</span>
        Admissions
      </a>
    </li>
  </ul>

  <p class="sidebar-section-label">Content Management</p>

  <ul class="sidebar-links">
    <li>
      <a href="{% url 'about' %}">
        <span class="nav-icon">🏫</span>
        School Info
      </a>
    </li>
   
    <li>
      <a href="{% url 'facilities' %}">
        <span class="nav-icon">🏢</span>
        Facilities
      </a>
    </li>
    <li>
      <a href="{% url 'gallery' %}">
        <span class="nav-icon">🖼️</span>
        Gallery
      </a>
    </li>
    <li>
      <a href="{% url 'news_list' %}">
        <span class="nav-icon">📰</span>
        News
      </a>
    </li>
  </ul>

  <!-- Footer -->
  <div class="sidebar-footer" style="margin-top:auto;">
    <div class="sidebar-footer-avatar">AD</div>
    <div class="sidebar-footer-info">
      <div class="sidebar-footer-name">{{ request.user.username|title }}</div>
      <div class="sidebar-footer-role">Administrator</div>
    </div>
    <a href="{% url 'admin_logout' %}" class="sidebar-footer-logout" title="Log out">↪</a>
  </div>

</div>
