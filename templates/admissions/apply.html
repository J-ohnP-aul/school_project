{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card">

<div class="card-body">

<h1 class="mb-4 text-center">
    Student Application
</h1>

<form method="POST"
      enctype="multipart/form-data">

    {% csrf_token %}

    {% for field in form %}

        <div class="mb-3">

            <label class="form-label">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
                <div class="text-danger">
                    {{ field.errors }}
                </div>
            {% endif %}

        </div>

    {% endfor %}

    <button class="btn btn-dark w-100">
        Submit Application
    </button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
