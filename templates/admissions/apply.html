{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4">
    Student Application
</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">

            <label class="form-label">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
                <div class="text-danger">
                    {{ field.errors }}
                </div>
            {% endif %}

        </div>
    {% endfor %}
    <button class="btn btn-dark">
        Submit Application
    </button>
</form>

{% endblock %}
